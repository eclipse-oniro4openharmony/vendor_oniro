                "insmod /mnt/kmodules/camera_pda.ko",
                "insmod /mnt/kmodules/camera_dpe_isp60.ko",
                "insmod /mnt/kmodules/camera_rsc_isp60.ko",
                "insmod /mnt/kmodules/camera_mfb_isp6s.ko",
                "chmod 666 /dev/camera-isp",
                "chmod 666 /dev/camera-mem",
                "chmod 666 /dev/camera-rsc",
                "chmod 666 /dev/kd_camera_hw",
                "chmod 666 /dev/seninf"
            ]
        },
        {
            "name" : "boot",
            "cmds" : [
                "start wmtwifi-on"
            ]
        }
    ],
    "services" : [
        {
            "name" : "wmtwifi-on",
            "path" : [ "/system/bin/wmtdetect-init", "wifi-on" ],
            "uid" : "root",
            "gid" : [ "root" ],
            "once" : 1
        }
    ]
}
