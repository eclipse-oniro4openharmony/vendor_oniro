{
    "jobs" : [
        {
            "name" : "pre-init",
            "cmds" : [
                "mkdir /dev/binderfs 0755 root root",
                "mount binder binder /dev/binderfs noexec,nosuid",
                "symlink /dev/binderfs/binder    /dev/binder",
                "symlink /dev/binderfs/hwbinder  /dev/hwbinder",
                "symlink /dev/binderfs/vndbinder /dev/vndbinder",
                "chmod 0666 /dev/binderfs/binder",
                "chmod 0666 /dev/binderfs/hwbinder",
                "chmod 0666 /dev/binderfs/vndbinder",
                "mkdir /dev/__properties__ 0755 root root",
                "mount tmpfs tmpfs /dev/__properties__ noexec,nosuid,nodev mode=0755",
                "mkdir /dev/pts 0755 root root",
                "mount devpts devpts /dev/pts noexec,nosuid mode=0620,gid=5",
                "insmod /mnt/kmodules/mali_mgm_.ko",
                "insmod /mnt/kmodules/mali_prot_alloc_.ko",
                "insmod /mnt/kmodules/mtk-mbox.ko",
                "insmod /mnt/kmodules/mtk-ssc.ko",
                "insmod /mnt/kmodules/mtk_gpu_hal.ko",
                "insmod /mnt/kmodules/mtk_low_battery_throttling.ko",
                "insmod /mnt/kmodules/mtk_dynamic_loading_throttling.ko",
                "insmod /mnt/kmodules/mtk_mdpm.ko",
                "insmod /mnt/kmodules/mtk_pbm.ko",
                "insmod /mnt/kmodules/mtk_rpmsg_mbox.ko",
                "insmod /mnt/kmodules/mtk_tinysys_ipi.ko",
                "insmod /mnt/kmodules/gpueb.ko",
                "insmod /mnt/kmodules/mcupm.ko",
                "insmod /mnt/kmodules/fhctl.ko",
                "insmod /mnt/kmodules/mtk_gpufreq_wrapper.ko",
                "insmod /mnt/kmodules/mtk_gpufreq_mt6789.ko",
                "insmod /mnt/kmodules/sspm_v3.ko",
                "insmod /mnt/kmodules/mtk_qos.ko",
                "insmod /mnt/kmodules/mtk_gpu_qos.ko",
                "insmod /mnt/kmodules/ged.ko",
                "insmod /mnt/kmodules/mali_kbase_mt6789.ko",
                "insmod /mnt/kmodules/chipone-tddi.ko",
                "write /sys/module/firmware_class/parameters/path /android/vendor/firmware",
                "insmod /mnt/kmodules/nvmem-mt635x-efuse.ko",
                "insmod /mnt/kmodules/mtk-afe-external.ko",
                "insmod /mnt/kmodules/scp.ko",
                "insmod /mnt/kmodules/adsp.ko",
                "insmod /mnt/kmodules/mtk-scp-audiocommon.ko",
                "insmod /mnt/kmodules/audio_ipi.ko",
                "insmod /mnt/kmodules/mtk-scp-audio.ko",
                "insmod /mnt/kmodules/snd-soc-audiodsp-common.ko",
                "insmod /mnt/kmodules/mtk-scp-ultra.ko",
                "insmod /mnt/kmodules/snd-soc-mtk-scp-ultra.ko",
                "insmod /mnt/kmodules/rps_perf.ko",
                "insmod /mnt/kmodules/ccmni.ko",
                "insmod /mnt/kmodules/ccci_util_lib.ko",
                "insmod /mnt/kmodules/ccci_auxadc.ko",
                "insmod /mnt/kmodules/ccci_md_all.ko",
                "insmod /mnt/kmodules/snd-soc-mtk-common.ko",
                "insmod /mnt/kmodules/mtk-sp-spk-amp.ko",
                "insmod /mnt/kmodules/smartpa.ko",
                "insmod /mnt/kmodules/mt6358-accdet.ko",
                "insmod /mnt/kmodules/snd-soc-mt6366.ko",
                "insmod /mnt/kmodules/snd-soc-mt6789-afe.ko",
                "insmod /mnt/kmodules/mtk-btcvsd.ko",
                "insmod /mnt/kmodules/mt6789-mt6366.ko",
                "exec_start /system/bin/rfkill unblock all"
            ]
        }
    ]
